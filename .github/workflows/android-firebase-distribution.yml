name: Android Firebase App Distribution

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Dar permisos a gradlew
        run: chmod +x ./gradlew

      - name: Crear archivo de credenciales Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> $GITHUB_ENV

      - name: Compilar APK debug
        run: ./gradlew assembleDebug

      - name: Crear notas de versión
        run: |
          cat <<EOF > release_notes.txt
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Autor: ${{ github.actor }}
          Mensaje: ${{ github.event.head_commit.message }}
          EOF

      - name: Instalar Firebase CLI
        run: npm install -g firebase-tools

      - name: Subir APK a Firebase App Distribution
        run: |
          firebase appdistribution:distribute app/build/outputs/apk/debug/app-debug.apk \
            --app "${{ secrets.FIREBASE_APP_ID }}" \
            --groups "${{ secrets.FIREBASE_TESTER_GROUPS }}" \
            --release-notes-file release_notes.txt

      - name: Guardar APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk